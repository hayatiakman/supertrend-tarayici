<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Supertrend Yeni AL ve SAT Sinyalleri</title>
  <meta name="description" content="Binance USDT paritelerinde 5 dakika, 15 dakika, 1 saat, 4 saat, günlük ve haftalık yeni Supertrend AL ve SAT sinyallerini takip edin.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="https://sadecepara.com/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Supertrend Yeni AL ve SAT Sinyalleri">
  <meta property="og:description" content="Binance USDT paritelerindeki güncel Supertrend yön değişimlerini farklı zaman dilimlerinde izleyin.">
  <meta property="og:url" content="https://sadecepara.com/">
  <meta property="og:site_name" content="Sadece Para">
  <meta name="twitter:card" content="summary">
  <style>
    body{font-family:system-ui,sans-serif;background:#0b1020;color:#e8edf7;margin:0;padding:20px}
    main{max-width:1200px;margin:auto}h1{font-size:23px;margin:0 0 7px}
    .muted{color:#9ba7bc;font-size:13px}.status{margin-top:5px}.error{color:#ff8b9c}
    .telegram{display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:9px 13px;border-radius:9px;background:#229ed9;color:#fff;text-decoration:none;font-weight:750;font-size:14px}
    .telegram:hover{background:#168bc2}.telegram svg{width:18px;height:18px;fill:currentColor}
    section{margin-top:20px}h2{font-size:18px;margin:0 0 8px}
    .card{overflow:auto;background:#121a2e;border:1px solid #26314b;border-radius:12px}
    table{width:100%;min-width:750px;border-collapse:collapse;table-layout:fixed}
    th,td{padding:9px 7px;border-right:1px solid #222c43;border-bottom:1px solid #222c43;text-align:center}
    th{font-size:13px;text-transform:uppercase;background:#182137}th span{opacity:.65;font-size:11px}
    tr:last-child td{border-bottom:0}.coin{display:block;padding:5px 4px;border-radius:6px;font-weight:750;font-size:12px}
    .buy h2,.buy th{color:#64e6b3}.sell h2,.sell th{color:#ff91a0}
    .buy .coin{color:#64e6b3;background:#173d35;border:1px solid #24644f}
    .sell .coin{color:#ff91a0;background:#44242e;border:1px solid #713442}
    .coin.common{border:2px solid #f6c453;box-shadow:0 0 0 2px #f6c45325,0 0 12px #f6c45345;color:#ffe29a}
    .empty{color:#59657b}.legend{display:inline-block;width:10px;height:10px;border:2px solid #f6c453;border-radius:3px;margin:8px 4px 0 0}
    #mobile{display:none}
    @media(max-width:650px){
      body{padding:12px}h1{font-size:19px}.desktop{display:none}#mobile{display:block}
      .mobile-card{margin-top:14px;padding:12px;background:#121a2e;border:1px solid #26314b;border-radius:12px}
      .mobile-card h2{margin:0 0 10px;color:#d7deeb;font-size:18px}
      .mobile-group{margin-top:10px}.mobile-label{font-size:12px;font-weight:800;margin-bottom:6px}
      .mobile-group.buy .mobile-label{color:#64e6b3}.mobile-group.sell .mobile-label{color:#ff91a0}
      .mobile-coins{display:flex;flex-wrap:wrap;gap:6px}.mobile-coins .coin{display:inline-block;padding:6px 8px}
    }
  </style>
</head>
<body>
<main>
  <h1>Supertrend Yeni AL ve SAT Sinyalleri</h1>
  <div id="summary" class="muted">Sonuclar yukleniyor...</div>
  <div id="status" class="muted status">Her dakika otomatik kontrol edilir.</div>
  <a class="telegram" href="https://t.me/sadeceparacom" target="_blank" rel="noopener noreferrer" aria-label="Sadece Para Telegram kanalına katıl">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.9 4.6c.3-1.3-.5-1.8-1.6-1.4L2.8 10c-1.2.5-1.2 1.2-.2 1.5l4.5 1.4 1.7 5.2c.2.7.1 1 .9 1 .6 0 .9-.3 1.2-.6l2.2-2.1 4.6 3.4c.9.5 1.5.3 1.7-.8l2.5-14.4zM8.5 12.6l9.9-6.2c.5-.3.9-.1.5.2l-8.2 7.4-.3 3.3-1.9-4.7z"/></svg>
    Telegram kanalına katıl
  </a>
  <div class="muted"><span class="legend"></span>Altin cerceve: birden fazla periyotta ayni sinyal</div>
  <div id="tables" class="desktop"></div>
  <div id="mobile"></div>
  <p class="muted">Yalnizca son kapanmis mumda yon degistiren pariteler gosterilir. Yatirim tavsiyesi degildir.</p>
</main>
<script>
const intervals = ["5m","15m","1h","4h","1d","1w"];
const intervalMs = {
  "5m": 5 * 60_000,
  "15m": 15 * 60_000,
  "1h": 60 * 60_000,
  "4h": 4 * 60 * 60_000,
  "1d": 24 * 60 * 60_000,
  "1w": 7 * 24 * 60 * 60_000,
};

function currentEvents(interval, events) {
  const now = Date.now();
  return events.filter(event => {
    const closeTime = new Date(event.candleCloseTime).getTime();
    return Number.isFinite(closeTime) && now < closeTime + intervalMs[interval];
  });
}

function signalTable(signal, cssClass, title, groups) {
  const appearances = new Map();
  for (const interval of intervals) {
    for (const event of groups[interval].events.filter(item => item.signal === signal)) {
      const current = appearances.get(event.symbol) || [];
      current.push(interval);
      appearances.set(event.symbol,current);
    }
  }
  const columns = intervals.map(interval => ({
    interval,
    events: groups[interval].events.filter(event => event.signal === signal),
  }));
  const maxRows = Math.max(1,...columns.map(column => column.events.length));
  const headers = columns.map(column =>
    `<th>${column.interval} <span>${column.events.length}</span></th>`).join("");
  const rows = Array.from({length:maxRows},(_,index) => {
    const cells = columns.map(column => {
      const event = column.events[index];
      if (!event) return `<td>${index === 0 ? '<span class="empty">-</span>' : ""}</td>`;
      const commonIntervals = appearances.get(event.symbol);
      const common = commonIntervals.length > 1;
      return `<td><span class="coin${common ? " common" : ""}"${common ? ` title="Ortak sinyal: ${commonIntervals.join(", ")}"` : ""}>${event.symbol.replace(/USDT$/,"/USDT")}</span></td>`;
    }).join("");
    return `<tr>${cells}</tr>`;
  }).join("");
  return `<section class="${cssClass}"><h2>${title}</h2><div class="card"><table>
    <thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div></section>`;
}

function coinList(events, signal, appearances) {
  const matches = events.filter(event => event.signal === signal);
  if (!matches.length) return '<span class="empty">Yok</span>';
  return matches.map(event => {
    const commonIntervals = appearances.get(`${signal}:${event.symbol}`) || [];
    const common = commonIntervals.length > 1;
    return `<span class="coin${common ? " common" : ""}"${common ? ` title="Ortak sinyal: ${commonIntervals.join(", ")}"` : ""}>${event.symbol.replace(/USDT$/,"/USDT")}</span>`;
  }).join("");
}

function mobileCards(groups) {
  const appearances = new Map();
  for (const interval of intervals) {
    for (const event of groups[interval].events) {
      const key = `${event.signal}:${event.symbol}`;
      const current = appearances.get(key) || [];
      current.push(interval);
      appearances.set(key,current);
    }
  }
  return intervals.map(interval => `<article class="mobile-card">
    <h2>${interval}</h2>
    <div class="mobile-group buy"><div class="mobile-label">YENI AL</div><div class="mobile-coins">${coinList(groups[interval].events,"YENI AL",appearances)}</div></div>
    <div class="mobile-group sell"><div class="mobile-label">YENI SAT</div><div class="mobile-coins">${coinList(groups[interval].events,"YENI SAT",appearances)}</div></div>
  </article>`).join("");
}

async function load() {
  const status = document.querySelector("#status");
  try {
    const response = await fetch("/api/results",{cache:"no-store"});
    if (!response.ok) throw new Error((await response.json()).error || "Veri alinamadi");
    const data = await response.json();
    const groups = Object.fromEntries(intervals.map(interval => [
      interval,
      {
        ...(data.intervals[interval] || {scannedAt:data.generatedAt}),
        events: currentEvents(interval,data.intervals[interval]?.events || []),
      },
    ]));
    const total = intervals.reduce((sum,interval) => sum + groups[interval].events.length,0);
    document.querySelector("#summary").textContent =
      `Binance Spot | Ilk ${data.settings.limit} USDT paritesi | ATR ${data.settings.atrPeriod} / Carpan ${data.settings.multiplier} | ${total} yeni sinyal`;
    document.querySelector("#tables").innerHTML =
      signalTable("YENI AL","buy","YENI AL",groups) +
      signalTable("YENI SAT","sell","YENI SAT",groups);
    document.querySelector("#mobile").innerHTML = mobileCards(groups);
    status.className = "muted status";
    status.textContent = `Veri yenilendi: ${new Date().toLocaleTimeString("tr-TR")} | Suresi dolan sinyaller otomatik silinir`;
  } catch (error) {
    status.className = "error status";
    status.textContent = error.message;
  }
}

load();
setInterval(load,60_000);
</script>
</body>
</html>
